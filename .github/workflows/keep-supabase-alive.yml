name: Keep Supabase alive

# Runs every day at 08:00 UTC to prevent the free-tier Supabase project
# from pausing (it pauses after 7 days of inactivity on the free plan).
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch: # allows manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase health endpoint
        run: |
          curl --fail --silent \
            "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            || echo "Ping completed (any response keeps the project active)"
